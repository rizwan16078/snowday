<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="SnowSense — Snow Day Calculator">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050a14"/>
      <stop offset="60%" stop-color="#0b1d3a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- snowflake mark -->
  <g transform="translate(80,80)" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9">
    <line x1="60" y1="0" x2="60" y2="120"/>
    <line x1="0" y1="60" x2="120" y2="60"/>
    <line x1="17" y1="17" x2="103" y2="103"/>
    <line x1="103" y1="17" x2="17" y2="103"/>
  </g>
  <text x="80" y="430" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif" font-weight="800" font-size="84" fill="#ffffff" letter-spacing="-2">SnowSense™</text>
  <text x="80" y="490" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Inter, sans-serif" font-weight="500" font-size="36" fill="#cbd5e1">Real-Time Snow Day Calculator</text>
  <text x="80" y="550" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#60a5fa" opacity="0.85">snowdaycalculate.com</text>
</svg>
